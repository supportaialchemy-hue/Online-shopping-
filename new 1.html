<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Online Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background: #111;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .product {
            background: white;
            width: 250px;
            margin: 15px;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .product img {
            width: 100%;
            border-radius: 5px;
        }

        .price {
            color: green;
            font-size: 18px;
            margin: 10px 0;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #111;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>My Online Store</h1>
</header>

<div class="container">

    <div class="product">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQF5wiJUQi-_dkNuJIK2m2JGkdOgblm2clsRg&s" alt="Product 1">
        <h3>Product 1</h3>
        <p class="price">$29.99</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSyUZJN9ElDT0OUUp0ZwrsHBeOwnuWM-bbi8w&s" alt="Product 2">
        <h3>Product 2</h3>
        <p class="price">$49.99</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRe13-9ibezrIaRNpURrL6S1-Ms8Qjhttl-2g&s" alt="Product 3">
        <h3>Product 3</h3>
        <p class="price">$19.99</p>
        <button>Add to Cart</button>
    </div>

</div>

<footer>
    � 2026 My Online Store | All Rights Reserved
</footer>

</body>
</html>
